// WHS Engine
function getTakeCount(count) {
  return count >= 20 ? 8 : count >= 19 ? 7 : count >= 17 ? 6 : count >= 15 ? 5 :
    count >= 13 ? 4 : count >= 11 ? 3 : count >= 9 ? 2 : count >= 7 ? 2 :
    count >= 5 ? 1 : count >= 3 ? 1 : 0;
}

function calcHandicapIndex(rounds) {
  const w = rounds.slice(-20);
  if (!w.length) return null;
  const take = getTakeCount(w.length);
  if (take === 0) return null;
  // En empate, preferir la más reciente (índice mayor en array cronológico)
  const sorted = [...w].map((r, i) => ({ ...r, i }))
    .sort((a, b) => a.differential - b.differential || b.i - a.i);
  const avg = sorted.slice(0, take).reduce((s, r) => s + r.differential, 0) / take;
  return Math.round(avg * 10) / 10;
}

function getBestIndices(rounds) {
  const take = getTakeCount(rounds.length);
  return new Set(
    [...rounds].map((r, i) => ({ ...r, i }))
      // En empate de diferencial, la RFEG prefiere la ronda más reciente
      // En orden cronológico, índice mayor = más reciente
      .sort((a, b) => a.differential - b.differential || b.i - a.i)
      .slice(0, take).map(r => r.i)
  );
}

function simulateNextRound(rounds, gross, cr, slope, asc) {
  const newDiff = Math.round(((gross - cr - (asc || 0)) * 113 / slope) * 10) / 10;
  const simRounds = [...rounds.slice(-19), { differential: newDiff }];
  const newHI = calcHandicapIndex(simRounds);
  const window20 = simRounds.slice(-20);
  const take = getTakeCount(window20.length);
  const sorted = [...window20].map((r, i) => ({ diff: r.differential, i })).sort((a, b) => a.diff - b.diff || b.i - a.i);
  const bestSet = new Set(sorted.slice(0, take).map(r => r.i));
  const newComputes = bestSet.has(window20.length - 1);
  return { newHandicap: newHI, differential: newDiff, computes: newComputes };
}
var getTC=getTakeCount,calcHI=calcHandicapIndex,getBest=getBestIndices;
function simRound(rds,g,cr,sl,asc){var r=simulateNextRound(rds,g,cr,sl,asc);return{nh:r.newHandicap,df:r.differential,cp:r.computes}}



// PDF Parser
async function loadPdfJs() {
  if (window.pdfjsLib) return window.pdfjsLib;
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      resolve(window.pdfjsLib);
    };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function parsePDF(file) {
  const pdfjsLib = await loadPdfJs();
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const pg = await pdf.getPage(i);
    const c = await pg.getTextContent();
    pages.push(c.items.map(item => item.str).join(" "));
  }
  return extractRFEGData(pages.join("\n"), pages);
}

async function fetchParse(lic,onM){
  onM("Cargando motor PDF...");await loadPdfJs();
  var pdfUrl=RFEG_URL+lic+".pdf";
  var blob=null;var errLog=[];

  async function isPdfBlob(b){
    if(!b||b.size<500)return false;
    try{var ab=await b.slice(0,4).arrayBuffer();var bytes=new Uint8Array(ab);return bytes[0]===0x25&&bytes[1]===0x50&&bytes[2]===0x44&&bytes[3]===0x46}catch(e){return false}
  }

  // Intento 1: Worker proxy (más fiable, evita CORS)
  onM("Conectando con la RFEG...");
  try{
    var r1=await fetch(WORKER+"/?license="+lic,{mode:"cors"});
    if(r1.ok){var b1=await r1.blob();if(await isPdfBlob(b1)){blob=b1}else{errLog.push("Worker: respuesta no es PDF ("+b1.size+" bytes)")}}
    else{errLog.push("Worker: HTTP "+r1.status)}
  }catch(e1){errLog.push("Worker: "+e1.message)}

  // Intento 2: directo a api.rfeg.es (puede fallar por CORS según navegador)
  if(!blob){
    onM("Intentando conexion directa...");
    try{
      var r2=await fetch(pdfUrl);
      if(r2.ok){var b2=await r2.blob();if(await isPdfBlob(b2)){blob=b2}else{errLog.push("Directo: respuesta no es PDF ("+b2.size+" bytes)")}}
      else{errLog.push("Directo: HTTP "+r2.status)}
    }catch(e2){errLog.push("Directo: "+e2.message)}
  }

  if(!blob){
    throw new Error("No se pudo descargar el PDF.\n"+errLog.join(" | ")+"\nPrueba abrir directamente: "+pdfUrl);
  }
  onM("Analizando datos...");
  var buf=await blob.arrayBuffer();
  var pdf;
  try{pdf=await window.pdfjsLib.getDocument({data:buf}).promise}catch(e){throw new Error("PDF corrupto o invalido: "+e.message)}
  var pages=[];
  for(var i=1;i<=pdf.numPages;i++){var pg=await pdf.getPage(i);var c=await pg.getTextContent();pages.push(c.items.map(function(x){return x.str}).join(" "))}
  var r=extractRFEGData(pages.join("\n"),pages);
  if(!r.rounds.length)throw new Error("Sin rondas");
  return{name:r.player_name,hi:r.handicap_index,rounds:r.rounds};
}

function parseDate(str) {
  const [d, m, y] = str.split("/");
  return new Date(+y, +m - 1, +d);
}

function extractRFEGData(fullText, pages) {
  const result = { player_name: "", handicap_index: null, rounds: [], raw: fullText };
  const nm = fullText.match(/FEDERADO:\s*([A-ZÁÉÍÓÚÑ\s,]+)\s*\(/i);
  if (nm) result.player_name = nm[1].trim().replace(/,$/, "");
  const hm = fullText.match(/NUEVO\s+H[AÁ]NDICAP[:\s]+(\d+[.,]\d)/i);
  if (hm) result.handicap_index = parseFloat(hm[1].replace(",", "."));

  const diffs = extractDifferentials(pages[4] || "");
  const p3 = extractPage3Data(pages[2] || "");
  const p1 = extractPage1Data(pages[0] || "");
  const n = Math.max(p1.length, p3.length, diffs.length);
  const roundsRaw = [];

  for (let i = 0; i < n; i++) {
    const r1 = p1[i] || {}, r3 = p3[i] || {};
    const diff = diffs[i] !== undefined ? diffs[i] : (r3.nivel || 0);
    roundsRaw.push({
      date: r1.date || r3.date || "",
      tournament: r1.tournament || r3.tournament || "",
      course: r1.course || "",
      cr: r3.cr || r1.cr || 0,
      slope: r3.slope || r1.slope || 0,
      hcp_juego: r1.hcp_juego || 0,
      stb: r1.stb || 0,
      asc: r3.asc || r1.asc || 0,
      differential: diff,
    });
  }

  // Ordenar cronológicamente: antigua → reciente
  roundsRaw.sort((a, b) => {
    if (!a.date || !b.date) return 0;
    return parseDate(a.date) - parseDate(b.date);
  });

  result.rounds = roundsRaw;
  return result;
}

function extractDifferentials(t) {
  const d = [];
  const lines = t.split(/(?=\b\d{1,2}\s+\d{2}\/\d{2}\/\d{4})/);
  for (const l of lines) {
    const m = l.match(/^\s*\d{1,2}\s+\d{2}\/\d{2}\/\d{4}\s+.+?\s+(\d+[.,]\d)\s*$/);
    if (m) { d.push(parseFloat(m[1].replace(",", "."))); continue; }
    const all = l.match(/\d+\.\d/g) || l.match(/\d+,\d/g);
    const dm = l.match(/^\s*\d{1,2}\s+\d{2}\/\d{2}\/\d{4}/);
    if (dm && all && all.length > 0) d.push(parseFloat(all[all.length - 1].replace(",", ".")));
  }
  return d;
}

function extractPage3Data(t) {
  const r = [];
  const p = /(\d{1,2})\s+(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s+(\d+)\s+(\d+[.,]\d+?)\s+(\d+)\s+(-?\d+)\s+(\d+[.,]\d+)/g;
  let m;
  while ((m = p.exec(t)) !== null) {
    r.push({ date: m[2], tournament: m[3].trim(), rba: parseInt(m[4]), cr: parseFloat(m[5].replace(",", ".")), slope: parseInt(m[6]), asc: parseInt(m[7]), nivel: parseFloat(m[8].replace(",", ".")) });
  }
  return r;
}

function extractPage1Data(t) {
  const r = [];
  const p = /(\d{1,2})\s+(\d{2}\/\d{2}\/\d{4})\s+([\s\S]*?)\s+([1-9])\s+([\s\S]*?)\s+Individuales\s+(\d+)\s+(\d+[.,]\d+)\/(\d+)\/(\d+)\s+[\d.,]+\s+(\d+)\s+(\d+)\s+(-?\d+)/g;
  let m;
  while ((m = p.exec(t)) !== null) {
    var courseName = m[5].trim().replace(/\s+/g, " ").replace(/^\d+\s+/, "");
    r.push({ date: m[2], tournament: m[3].trim().replace(/\s+/g, " "), course: courseName, cr: parseFloat(m[7].replace(",", ".")), slope: parseInt(m[8]), hcp_juego: parseInt(m[10]), stb: parseInt(m[11]), asc: parseInt(m[12]) });
  }
  if (r.length === 0) {
    const sp = /(\d{2}\/\d{2}\/\d{4})[\s\S]*?(\d+[.,]\d+)\/(\d+)\/\d+\s+[\d.,]+\s+(\d+)\s+(\d+)\s+(-?\d+)/g;
    let sm;
    while ((sm = sp.exec(t)) !== null) {
      r.push({ date: sm[1], tournament: "", course: "", cr: parseFloat(sm[2].replace(",", ".")), slope: parseInt(sm[3]), hcp_juego: parseInt(sm[4]), stb: parseInt(sm[5]), asc: parseInt(sm[6]) });
    }
  }
  return r;
}



// Styles
var C={bg:"#0b1c04",green:"#2d5016",gl:"#3d6b20",gold:"#c8a951",gd:"rgba(200,169,81,0.6)",white:"rgba(255,255,255,0.88)",dim:"rgba(255,255,255,0.35)",dimmer:"rgba(255,255,255,0.12)",card:"rgba(255,255,255,0.04)",border:"rgba(255,255,255,0.09)",good:"#5db870",bad:"#d06060",blue:"#5b9bd5"};
var lbl={display:"block",fontSize:"10px",letterSpacing:"2px",color:C.dim,marginBottom:"6px",fontFamily:"monospace"};
var inp={width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid "+C.border,borderRadius:"8px",color:C.white,padding:"12px 14px",fontSize:"15px",outline:"none",boxSizing:"border-box"};

// Components
function Card(p){return <div className="fade-in" style={Object.assign({background:C.card,border:"1px solid "+C.border,borderRadius:"16px",padding:"20px"},p.style||{})}>{p.children}</div>}

function Header(p){return(<div onClick={p.onHome||undefined} style={{borderBottom:"1px solid "+C.border,padding:"14px 20px",display:"flex",alignItems:"center",gap:"10px",background:"rgba(0,0,0,0.25)",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(10px)",cursor:p.onHome?"pointer":"default"}}><span style={{fontSize:"20px"}}>{String.fromCodePoint(0x26F3)}</span><span style={{fontSize:"13px",letterSpacing:"3px",fontFamily:"monospace",color:C.gold}}>GOLF HANDICAP</span><span style={{fontSize:"10px",color:C.dimmer,letterSpacing:"1px"}}>RFEG / WHS</span></div>)}

function HIndexCard(p){
  var st=useState(false),show=st[0],setShow=st[1];

  return(<div style={{background:C.card,border:"1px solid "+C.border,borderRadius:"12px",padding:p.mob?"12px 10px":"16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{display:"flex",alignItems:"center",gap:"6px"}}><span style={{fontSize:p.mob?"22px":"28px",fontFamily:"monospace",color:tc,fontWeight:"500"}}>{p.val!=null?p.val.toFixed(1):"\u2014"}</span>{ta?<span style={{fontSize:"12px",color:tc}}>{ta}</span>:null}</div><div style={{fontSize:p.mob?"8px":"9px",letterSpacing:"1.5px",color:C.gd,marginTop:"2px"}}>{p.label}</div></div>
      <button onClick={function(e){e.stopPropagation();setShow(!show)}} style={{background:"rgba(200,169,81,0.15)",border:"none",borderRadius:"50%",width:"22px",height:"22px",color:C.gold,cursor:"pointer",fontSize:"12px",fontWeight:"700",fontFamily:"serif",display:"flex",alignItems:"center",justifyContent:"center"}}>i</button>
    </div>
    {show?<div style={{marginTop:"10px",padding:"10px",background:"rgba(0,0,0,0.3)",borderRadius:"8px",fontSize:"11px",color:C.dim,lineHeight:1.5}}><strong style={{color:C.gold}}>{p.label}</strong> es la media de los diferenciales de las <strong style={{color:C.white}}>ultimas {p.win} rondas</strong>. Sirve para ver la tendencia reciente respecto al HI oficial.{p.trend==="good"?<span style={{color:C.good}}> Mejor que el HI = tendencia positiva.</span>:null}{p.trend==="bad"?<span style={{color:C.bad}}> Peor que el HI = tendencia negativa.</span>:null}</div>:null}
  </div>)
}

function CourseStats(p){
  var st=useState(null),exp=st[0],setExp=st[1];
  // Build a CR/Slope to real course name map from rounds that have course
  var crSlMap={};p.rounds.forEach(function(r){if(r.course){var key=r.cr+"/"+r.slope;if(!crSlMap[key])crSlMap[key]=r.course}});
  // Tournament-like patterns
  var tourneyRe=/jornada|torneo|prueba|copa|ranking|circuito|campeonato/i;
  var stats={};p.rounds.forEach(function(r){
    var nm=r.course||r.tournament||"?";
    // If name looks like a tournament, try to find real course by CR/Slope
    if(!r.course&&tourneyRe.test(nm)){var key=r.cr+"/"+r.slope;if(crSlMap[key])nm=crSlMap[key]}
    if(!stats[nm])stats[nm]={diffs:[],dates:[],stbs:[],cr:r.cr,slope:r.slope};stats[nm].diffs.push(r.differential);stats[nm].dates.push(r.date);stats[nm].stbs.push(r.stb)});
  var sorted=Object.keys(stats).map(function(nm){var s=stats[nm];var avg=Math.round(s.diffs.reduce(function(a,b){return a+b},0)/s.diffs.length*10)/10;return{name:nm,n:s.diffs.length,avg:avg,best:Math.min.apply(null,s.diffs),worst:Math.max.apply(null,s.diffs),last:s.dates[s.dates.length-1],bstb:Math.max.apply(null,s.stbs.concat([0])),cr:s.cr,slope:s.slope,diffs:s.diffs}}).sort(function(a,b){return b.n-a.n||a.avg-b.avg});
  var maxN=sorted.length?sorted[0].n:1;
  return(<Card style={{marginBottom:"20px"}}><div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}}><span style={{fontSize:"18px"}}>{String.fromCodePoint(0x26F3)}</span><h2 style={{margin:0,fontSize:"16px",color:C.gold,fontWeight:"normal"}}>Estadisticas por Campo</h2></div>
    {sorted.map(function(s,i){var isO=exp===i;var bw=Math.round(s.n/maxN*100);var dc=s.avg<=18?C.good:s.avg<=23?C.gold:C.bad;
      return(<div key={i} style={{marginBottom:"6px"}}>
        <div onClick={function(){setExp(isO?null:i)}} style={{background:isO?"rgba(200,169,81,0.08)":"rgba(255,255,255,0.02)",border:"1px solid "+(isO?"rgba(200,169,81,0.2)":C.border),borderRadius:isO?"10px 10px 0 0":"10px",padding:p.mob?"10px 12px":"12px 16px",cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
            <div style={{flex:1,minWidth:0}}><div style={{color:C.white,fontSize:p.mob?"12px":"13px",fontWeight:"500",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div></div>
            <div style={{display:"flex",alignItems:"center",gap:"12px",flexShrink:0}}><span title="Veces jugado en este campo" style={{fontSize:"10px",color:C.dim,fontFamily:"monospace"}}>{s.n}x</span><span title={"Media de diferencial en este campo: "+s.avg.toFixed(1)+". Cuanto mas bajo, mejor"} style={{fontSize:"15px",fontFamily:"monospace",fontWeight:"600",color:dc}}>{s.avg.toFixed(1)}</span><span style={{fontSize:"10px",color:C.dimmer}}>{isO?"\u25B2":"\u25BC"}</span></div>
          </div>
          <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"3px",height:"4px"}}><div style={{width:bw+"%",height:"100%",background:"linear-gradient(90deg,"+C.gold+","+C.gd+")",borderRadius:"3px"}}/></div>
        </div>
        {isO?<div style={{background:"rgba(0,0,0,0.2)",border:"1px solid rgba(200,169,81,0.15)",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"12px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"10px"}}>
            <div title="Tu mejor diferencial en este campo. Cuanto mas bajo, mejor juegas" style={{textAlign:"center"}}><div style={{fontSize:"18px",fontFamily:"monospace",color:C.good}}>{s.best.toFixed(1)}</div><div style={{fontSize:"8px",letterSpacing:"1px",color:C.dim}}>MEJOR DIF.</div></div>
            <div title="Tu peor diferencial en este campo" style={{textAlign:"center"}}><div style={{fontSize:"18px",fontFamily:"monospace",color:C.bad}}>{s.worst.toFixed(1)}</div><div style={{fontSize:"8px",letterSpacing:"1px",color:C.dim}}>PEOR DIF.</div></div>
            <div title="Tu mejor puntuacion Stableford en este campo. Cuanto mas alto, mejor" style={{textAlign:"center"}}><div style={{fontSize:"18px",fontFamily:"monospace",color:C.gold}}>{s.bstb||"\u2014"}</div><div style={{fontSize:"8px",letterSpacing:"1px",color:C.dim}}>MEJOR STB</div></div>
          </div>
          <div style={{fontSize:"10px",color:C.dim,fontFamily:"monospace",display:"flex",gap:"12px",flexWrap:"wrap"}}><span>CR {s.cr}</span><span>Slope {s.slope}</span><span>Ultima: {s.last}</span></div>
          {s.diffs.length>1?<div title="Cada barra es una ronda. Mas baja y verde = mejor resultado" style={{marginTop:"8px",display:"flex",gap:"4px",alignItems:"flex-end",height:"32px"}}>{s.diffs.map(function(d,j){var mx=Math.max.apply(null,s.diffs),mn=Math.min.apply(null,s.diffs),rg=mx-mn||1;var h=8+(d-mn)/rg*24;return<div key={j} title={"Dif. "+d.toFixed(1)} style={{flex:1,height:h+"px",background:d<=18?C.good:d<=23?C.gold:C.bad,borderRadius:"2px",opacity:0.7}}/>})}</div>:null}
        </div>:null}
      </div>)
    })}
  </Card>)
}

function HIChart(p){
  if(!p.history||p.history.length<2)return(<div style={{padding:"20px",textAlign:"center",color:C.dim,fontSize:"12px"}}>Se necesitan al menos 2 consultas con HI diferente para la grafica.</div>);
  var all=p.history.concat(p.h2||[]);var vs=all.map(function(x){return x.hi});var lo=Math.floor(Math.min.apply(null,vs)-1),hi=Math.ceil(Math.max.apply(null,vs)+1),rng=hi-lo||1;
  var W=340,H=180,PD={t:20,r:15,b:30,l:40},pW=W-PD.l-PD.r,pH=H-PD.t-PD.b;
  function pts(h){if(!h||h.length<2)return"";return h.map(function(pt,i){return(PD.l+i/(h.length-1)*pW)+","+(PD.t+(1-(pt.hi-lo)/rng)*pH)}).join(" ")}
  var yT=[];var stp=rng<=5?0.5:rng<=10?1:2;for(var v=Math.ceil(lo/stp)*stp;v<=hi;v+=stp)yT.push({v:v,y:PD.t+(1-(v-lo)/rng)*pH});
  return(<svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",maxWidth:"500px"}}>
    {yT.map(function(t,i){return<g key={i}><line x1={PD.l} y1={t.y} x2={W-PD.r} y2={t.y} stroke="rgba(255,255,255,0.06)" strokeWidth="0.5"/><text x={PD.l-6} y={t.y+3} textAnchor="end" fill="rgba(255,255,255,0.3)" fontSize="8" fontFamily="monospace">{t.v.toFixed(1)}</text></g>})}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}><div><label style={lbl}>Golpes min</label><input value={mn} onChange={function(e){sMn(parseInt(e.target.value)||70)}} style={inp} type="number"/></div><div><label style={lbl}>Golpes max</label><input value={mx} onChange={function(e){sMx(parseInt(e.target.value)||105)}} style={inp} type="number"/></div></div>
    <button onClick={run} style={{background:"linear-gradient(135deg,"+C.green+","+C.gl+")",border:"none",borderRadius:"10px",color:"white",padding:"14px",cursor:"pointer",fontSize:"14px",fontFamily:"monospace",width:"100%"}}>SIMULAR</button>
    {res.length>0?<div style={{marginTop:"18px"}}>{thr?<div style={{background:"rgba(93,184,112,0.12)",border:"1px solid rgba(93,184,112,0.25)",borderRadius:"10px",padding:"12px",marginBottom:"12px",fontSize:"13px",color:C.good}}>Para bajar el HI: <strong>{thr.g} golpes o menos</strong></div>:null}<div style={{maxHeight:"300px",overflowY:"auto"}}><div style={{display:"grid",gridTemplateColumns:"55px 80px 80px 70px 40px",gap:"4px",padding:"6px 8px",fontSize:"9px",color:C.dim,borderBottom:"1px solid "+C.border,marginBottom:"6px"}}><span>BRUTA</span><span>DIFER.</span><span>NUEVO HI</span><span>CAMBIO</span><span style={{textAlign:"center"}}>{"\u2B50"}</span></div>{disp.map(function(s,i){var dc=s.delta<0?C.good:s.delta>0?C.bad:C.dim;return<div key={i} style={{display:"grid",gridTemplateColumns:"55px 80px 80px 70px 40px",gap:"4px",padding:"5px 8px",borderRadius:"6px",background:s.delta<0?"rgba(93,184,112,0.06)":s.delta>0?"rgba(208,96,96,0.05)":"transparent",fontSize:"13px",fontFamily:"monospace"}}><span style={{color:C.white}}>{s.g}</span><span style={{color:C.dim}}>{s.d.toFixed(1)}</span><span style={{color:C.gold,fontWeight:"600"}}>{s.hi!=null?s.hi.toFixed(1):"\u2014"}</span><span style={{color:dc}}>{s.delta!=null?(s.delta>0?"\u25B2":s.delta<0?"\u25BC":"\u2550"):"\u2014"} {s.delta!=null?Math.abs(s.delta).toFixed(1):""}</span><span style={{textAlign:"center",fontSize:"11px"}}>{s.c?"\u2B50":"\u2014"}</span></div>})}</div>{ceil?<div style={{marginTop:"12px",padding:"14px",background:"rgba(200,169,81,0.08)",border:"1px solid rgba(200,169,81,0.2)",borderRadius:"10px",fontSize:"12px",color:C.dim}}><span style={{color:C.gold,fontWeight:"600"}}>A partir de {ceil.g} golpes: HI = {ceil.hi!=null?ceil.hi.toFixed(1):""}</span></div>:null}</div>:null}
  </Card>)
}

function App(){
  var _st=useState("home"),step=_st[0],setStep=_st[1];
  var _li=useState(""),lic=_li[0],setLic=_li[1];
  var _d=useState(null),data=_d[0],setData=_d[1];
  var _lm=useState(""),lMsg=_lm[0],setLMsg=_lm[1];
  var _em=useState(""),err=_em[0],setErr=_em[1];
  var _sa=useState(false),showAll=_sa[0],setSA=_sa[1];
  var _mo=useState(window.innerWidth<700),mob=_mo[0],setMob=_mo[1];
  var _pr=useState(loadProfiles()),profs=_pr[0],setProfsS=_pr[1];
  var _cl=useState(null),curLic=_cl[0],setCurLic=_cl[1];
  var _h=useState([]),hist=_h[0],setHist=_h[1];
  var _cp=useState(null),compP=_cp[0],setCompP=_cp[1];
  var _h2=useState([]),hist2=_h2[0],setHist2=_h2[1];
  var _tab=useState("evo"),tab=_tab[0],setTab=_tab[1];

  useEffect(function(){var fn=function(){setMob(window.innerWidth<700)};window.addEventListener("resize",fn);return function(){window.removeEventListener("resize",fn)}},[]);
  function setProfs(p){setProfsS(p);saveProfiles(p)}
  var goHome=function(){setStep("home");setData(null);setCompP(null);setSA(false)};
  var consult=async function(l){setCurLic(l);setErr("");setData(null);setStep("loading");try{var p=await fetchParse(l,setLMsg);setData(p);var pp=loadProfiles();var ex=pp.findIndex(function(x){return x.license===l});var pd={license:l,name:p.name,hi:p.hi,lastUpdate:new Date().toISOString().slice(0,10)};if(ex>=0)pp[ex]=pd;else pp.push(pd);setProfs(pp);setHist(addHP(l,p.hi));setStep("dashboard")}catch(e){setErr(e.message);setStep("home")}};
  var addPlayer=function(){var c=lic.replace(/\D/g,"").slice(-6);if(c.length<6)return;setLic("");consult(c)};
  var delProf=function(l){setProfs(profs.filter(function(p){return p.license!==l}));try{localStorage.removeItem("gh_"+l)}catch(e){}};

  var last20=data?data.rounds.slice(-20):[];
  var hi=data?(data.hi!=null?data.hi:calcHI(last20)):null;
  var usedSet=last20.length?getBest(last20):new Set();
  var curProf=profs.find(function(p){return p.license===curLic});

  return(<div style={{minHeight:"100vh",background:C.bg}}>
    <Header onHome={step!=="home"?goHome:null}/>
    <div style={{maxWidth:"1000px",margin:"0 auto",padding:mob?"20px 14px":"36px 20px"}}>

    {step==="home"?<div className="fade-in">
      <div style={{textAlign:"center",marginBottom:"32px"}}><div style={{fontSize:"48px",marginBottom:"12px"}}>{String.fromCodePoint(0x1F3CC,0xFE0F)}</div><h1 style={{fontSize:mob?"22px":"28px",margin:"0 0 8px",fontWeight:"normal"}}>Golf Handicap RFEG</h1><p style={{color:C.dim,fontSize:"13px"}}>Selecciona un jugador o introduce una nueva licencia</p></div>
      {err?<div style={{background:"rgba(160,48,32,0.15)",border:"1px solid rgba(160,48,32,0.3)",borderRadius:"10px",padding:"12px 16px",marginBottom:"16px",fontSize:"12px",color:"#e07060",wordBreak:"break-word",lineHeight:1.5}}>Error: {err}</div>:null}
      {profs.length>0?<div style={{marginBottom:"24px"}}><div style={{fontSize:"10px",letterSpacing:"2px",color:C.dim,marginBottom:"10px",fontFamily:"monospace"}}>JUGADORES GUARDADOS</div>
        {profs.map(function(p){return<div key={p.license} onClick={function(){consult(p.license)}} style={{background:"linear-gradient(135deg,#132b07 0%,"+C.green+" 100%)",borderRadius:"14px",padding:"18px 20px",marginBottom:"10px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:"16px",fontWeight:"600",color:"white"}}>{p.name||"Jugador"}</div><div style={{fontSize:"10px",color:"rgba(255,255,255,0.4)",fontFamily:"monospace"}}>Licencia {p.license} - {p.lastUpdate}</div></div><div style={{display:"flex",alignItems:"center",gap:"12px"}}><div style={{textAlign:"right"}}><div style={{fontSize:"28px",color:C.gold,fontWeight:"300",lineHeight:1}}>{p.hi!=null?p.hi:"\u2014"}</div><div style={{fontSize:"8px",color:"rgba(255,255,255,0.4)"}}>HI</div></div><button onClick={function(e){e.stopPropagation();delProf(p.license)}} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:"6px",color:"rgba(255,255,255,0.3)",padding:"4px 8px",cursor:"pointer",fontSize:"14px"}}>{"\u00D7"}</button></div></div>})}</div>:null}
      <Card><div style={{fontSize:"10px",letterSpacing:"2px",color:C.dim,marginBottom:"10px",fontFamily:"monospace"}}>{profs.length?"AGREGAR OTRO JUGADOR":"INTRODUCE TU LICENCIA RFEG"}</div><div style={{display:"flex",gap:"10px"}}><input value={lic} onChange={function(e){setLic(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")addPlayer()}} placeholder="Numero de licencia" style={Object.assign({},inp,{fontSize:"18px",letterSpacing:"3px",flex:1})} inputMode="numeric"/><button onClick={addPlayer} style={{background:"linear-gradient(135deg,"+C.gold+",#a8893d)",border:"none",borderRadius:"10px",color:"#1a3a0a",padding:"0 20px",cursor:"pointer",fontWeight:"700",fontSize:"13px",fontFamily:"monospace",whiteSpace:"nowrap"}}>CONSULTAR</button></div></Card>
    </div>:null}

    {step==="loading"?<div className="fade-in" style={{textAlign:"center",paddingTop:"80px"}}><div style={{width:"48px",height:"48px",border:"3px solid "+C.border,borderTopColor:C.gold,borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 24px"}}/><div style={{fontSize:"16px",color:C.white}}>{lMsg}</div></div>:null}

    {step==="dashboard"&&data?<div className="fade-in">
      <div style={{background:"linear-gradient(135deg,#132b07 0%,"+C.green+" 60%,"+C.gl+" 100%)",borderRadius:"20px",padding:"28px",color:"white",position:"relative",overflow:"hidden",boxShadow:"0 16px 50px rgba(20,60,8,0.5)",marginBottom:"20px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:"9px",letterSpacing:"3px",color:C.gold,fontFamily:"monospace",marginBottom:"4px"}}>LICENCIA {curLic}</div><div style={{fontSize:"20px",fontWeight:"600",marginBottom:"2px"}}>{data.name||"Jugador"}</div><div style={{fontSize:"10px",color:"rgba(255,255,255,0.4)"}}>Real Federacion Espanola de Golf</div></div><button onClick={goHome} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"8px",color:"white",padding:"6px 12px",cursor:"pointer",fontSize:"10px",letterSpacing:"1px"}}>INICIO</button></div><div style={{marginTop:"20px",display:"flex",alignItems:"flex-end",gap:"8px"}}><span style={{fontSize:"60px",lineHeight:1,color:C.gold,fontWeight:"300"}}>{hi!=null?hi:"\u2014"}</span><div style={{paddingBottom:"8px"}}><div style={{fontSize:"9px",color:"rgba(255,255,255,0.5)",letterSpacing:"2px"}}>HANDICAP INDEX</div></div></div></div>

      {(function(){var l10=data.rounds.slice(-10),l5=data.rounds.slice(-5);var h10=l10.length?Math.round(l10.reduce(function(s,r){return s+r.differential},0)/l10.length*10)/10:null;var h5=l5.length?Math.round(l5.reduce(function(s,r){return s+r.differential},0)/l5.length*10)/10:null;var t10=h10!=null&&hi!=null?(h10<hi?"good":h10>hi?"bad":"same"):"same";var t5=h5!=null&&hi!=null?(h5<hi?"good":h5>hi?"bad":"same"):"same";
        return<div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:mob?"6px":"12px",marginBottom:"8px"}}>{[{l:"RONDAS",v:data.rounds.length,c:C.white},{l:"COMPUTAN",v:usedSet.size+" \u2B50",c:C.gold},{l:"MEJOR",v:last20.length?Math.min.apply(null,last20.map(function(r){return r.differential})).toFixed(1):"\u2014",c:C.white},{l:"MEDIA",v:last20.length?(last20.reduce(function(s,r){return s+r.differential},0)/last20.length).toFixed(1):"\u2014",c:C.white}].map(function(x,i){return<div key={i} style={{background:C.card,border:"1px solid "+C.border,borderRadius:"12px",padding:mob?"12px 6px":"16px",textAlign:"center"}}><div style={{fontSize:mob?"17px":"22px",fontFamily:"monospace",color:x.c,marginBottom:"2px"}}>{x.v}</div><div style={{fontSize:mob?"7px":"8px",letterSpacing:"1.5px",color:C.gd}}>{x.l}</div></div>})}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:mob?"6px":"12px",marginBottom:"20px"}}><HIndexCard label="H10" val={h10} trend={t10} win={10} mob={mob}/><HIndexCard label="H5" val={h5} trend={t5} win={5} mob={mob}/></div></div>
      })()}

      <div style={{display:"flex",justifyContent:"center",gap:"6px",marginBottom:"20px",flexWrap:"wrap"}}>
        {[{id:"evo",icon:"\uD83D\uDCC8",label:"Evolucion"},{id:"campos",icon:"\u26F3",label:"Campos"},{id:"goal",icon:"\uD83C\uDFAF",label:"Objetivo"},{id:"hcpj",icon:"\uD83E\uDDEE",label:"HCP Juego"},{id:"rondas",icon:"\uD83D\uDCCB",label:"Rondas"},{id:"sim",icon:"\uD83C\uDFCC\uFE0F",label:"Simulador"}].map(function(t){
          var active=tab===t.id;
          return<button key={t.id} onClick={function(){setTab(t.id)}} style={{background:active?"rgba(200,169,81,0.15)":"rgba(255,255,255,0.03)",border:"1px solid "+(active?"rgba(200,169,81,0.3)":C.border),borderRadius:"10px",padding:"8px 12px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",minWidth:"60px"}}><span style={{fontSize:"16px"}}>{t.icon}</span><span style={{fontSize:"8px",letterSpacing:"1px",color:active?C.gold:C.dim,fontFamily:"monospace"}}>{t.label}</span></button>
        })}
      </div>

      {tab==="evo"?<Card style={{marginBottom:"20px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}><h2 style={{margin:0,fontSize:"16px",color:C.gold,fontWeight:"normal"}}>Evolucion del Handicap</h2>
        {profs.length>1&&!compP?<button onClick={function(){var o=profs.filter(function(x){return x.license!==curLic});if(o.length===1){setCompP(o[0]);setHist2(loadHistory(o[0].license))}}} style={{background:"rgba(91,155,213,0.15)",border:"1px solid rgba(91,155,213,0.3)",borderRadius:"8px",color:C.blue,padding:"5px 12px",cursor:"pointer",fontSize:"10px",fontFamily:"monospace"}}>COMPARAR</button>:null}
        {compP?<button onClick={function(){setCompP(null);setHist2([])}} style={{background:"rgba(91,155,213,0.15)",border:"1px solid rgba(91,155,213,0.3)",borderRadius:"8px",color:C.blue,padding:"5px 12px",cursor:"pointer",fontSize:"10px",fontFamily:"monospace"}}>QUITAR</button>:null}
      </div><HIChart history={hist} h2={compP?hist2:null} n1={curProf?(curProf.name||"").split(",")[0].split(" ")[0]:""} n2={compP?(compP.name||"").split(",")[0].split(" ")[0]:""}/></Card>:null}

      {tab==="campos"?<CourseStats rounds={data.rounds} mob={mob}/>:null}

      {tab==="goal"?(function(){var l5=data.rounds.slice(-5);var h5v=l5.length?Math.round(l5.reduce(function(s,r){return s+r.differential},0)/l5.length*10)/10:null;return<HIGoal hi={hi} lic={curLic} h5={h5v}/>})():null}

      {tab==="hcpj"?<PlayingHCP hi={hi}/>:null}

      {tab==="rondas"?<Card style={{marginBottom:"20px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}><h2 style={{margin:0,fontSize:"16px",color:C.gold,fontWeight:"normal"}}>Ultimas {last20.length} Rondas</h2><span style={{fontSize:"9px",color:C.dim}}>{"\u2B50"} = computa</span></div><div style={{fontSize:"11px",color:C.dim,marginBottom:"12px"}}>Los <span style={{color:C.gold}}>{usedSet.size} mejores</span> de {last20.length}</div>
        {!mob?<div><div style={{display:"grid",gridTemplateColumns:"32px 2fr 1fr 60px 60px 55px 65px 28px",gap:"6px",padding:"5px 14px",fontSize:"9px",letterSpacing:"2px",color:C.dim}}><span>#</span><span>CAMPO</span><span style={{textAlign:"center"}}>FECHA</span><span style={{textAlign:"center"}}>CR</span><span style={{textAlign:"center"}}>SLP</span><span style={{textAlign:"center"}}>STB</span><span style={{textAlign:"center"}}>DIF.</span><span/></div></div>:null}
        {(function(){var rev=last20.slice().reverse();var ds=showAll?rev:rev.slice(0,10);return<div>{ds.map(function(r,i){var idx=last20.length-1-i;return<RoundRow key={i} round={r} isUsed={usedSet.has(idx)} rowLabel={data.rounds.length-i} mob={mob}/>})}{last20.length>10?<button onClick={function(){setSA(!showAll)}} style={{marginTop:"8px",width:"100%",background:"transparent",border:"1px solid "+C.border,color:C.dim,borderRadius:"8px",padding:"10px",cursor:"pointer",fontSize:"12px"}}>{showAll?"MENOS":"VER "+last20.length}</button>:null}</div>})()}
      </Card>:null}

      {tab==="sim"?<Simulator rounds={data.rounds} hi={hi}/>:null}

      <div style={{textAlign:"center",marginTop:"10px"}}><button onClick={function(){consult(curLic)}} style={{background:"transparent",border:"1px solid "+C.border,color:C.dim,borderRadius:"8px",padding:"10px 20px",cursor:"pointer",fontSize:"12px"}}>Actualizar datos</button></div>
    </div>:null}

    </div>
    <div style={{borderTop:"1px solid "+C.border,padding:"14px",textAlign:"center",fontSize:"9px",color:C.dimmer,marginTop:"20px"}}>Golf Handicap v13</div>
  </div>)
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
